name: Deploy Java App to AWS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build application with Maven
        run: mvn clean package -Dmaven.test.skip=true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: eu-north-1

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region eu-north-1 | docker login --username AWS --password-stdin 350646758224.dkr.ecr.eu-north-1.amazonaws.com

      - name: Build Docker image
        run: docker build -t spring-demo .

      - name: Tag Docker image
        run: docker tag spring-demo:latest 350646758224.dkr.ecr.eu-north-1.amazonaws.com/spring-demo:latest

      - name: Push Docker image to ECR
        run: docker push 350646758224.dkr.ecr.eu-north-1.amazonaws.com/spring-demo:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            if ! command -v docker &> /dev/null
            then
              sudo apt update
              sudo apt install docker.io -y
              sudo systemctl start docker
              sudo systemctl enable docker
            fi

            if ! command -v aws &> /dev/null
            then
              sudo apt update
              sudo apt install unzip curl -y
              curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
              unzip -o awscliv2.zip
              sudo ./aws/install
            fi

            aws ecr get-login-password --region eu-north-1 | sudo docker login --username AWS --password-stdin 350646758224.dkr.ecr.eu-north-1.amazonaws.com

            sudo docker pull 350646758224.dkr.ecr.eu-north-1.amazonaws.com/spring-demo:latest
            sudo docker stop spring-demo || true
            sudo docker rm spring-demo || true
            sudo docker run -d --name spring-demo -p 9091:9091 350646758224.dkr.ecr.eu-north-1.amazonaws.com/spring-demo:latest