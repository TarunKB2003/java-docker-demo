name: Deploy Java App to AWS

on:
  push:
    branches:
      - dev
      - uat
      - main
    paths:
      - "src/**"
      - "Dockerfile"
      - "pom.xml"
      - ".github/workflows/**"

  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  ECR_REGISTRY: 350646758224.dkr.ecr.eu-north-1.amazonaws.com
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Export Variables by Branch
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "ROLE_ARN=${{ secrets.PROD_ROLE_ARN }}" >> $GITHUB_ENV
            echo "ECR_REPOSITORY=spring-demo-prod" >> $GITHUB_ENV
            echo "APP_ENV=prod" >> $GITHUB_ENV
            echo "SERVER_PORT=9091" >> $GITHUB_ENV
            echo "CONTAINER_NAME=spring-demo-prod" >> $GITHUB_ENV
          elif [[ "${{ github.ref_name }}" == "uat" ]]; then
            echo "ROLE_ARN=${{ secrets.UAT_ROLE_ARN }}" >> $GITHUB_ENV
            echo "ECR_REPOSITORY=spring-demo-uat" >> $GITHUB_ENV
            echo "APP_ENV=uat" >> $GITHUB_ENV
            echo "SERVER_PORT=9092" >> $GITHUB_ENV
            echo "CONTAINER_NAME=spring-demo-uat" >> $GITHUB_ENV
          elif [[ "${{ github.ref_name }}" == "dev" ]]; then
            echo "ROLE_ARN=${{ secrets.DEV_ROLE_ARN }}" >> $GITHUB_ENV
            echo "ECR_REPOSITORY=spring-demo-dev" >> $GITHUB_ENV
            echo "APP_ENV=dev" >> $GITHUB_ENV
            echo "SERVER_PORT=9093" >> $GITHUB_ENV
            echo "CONTAINER_NAME=spring-demo-dev" >> $GITHUB_ENV
          fi

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}

      - name: Build application
        run: mvn clean package -Dmaven.test.skip=true

  deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Export Variables by Branch
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "ROLE_ARN=${{ secrets.PROD_ROLE_ARN }}" >> $GITHUB_ENV
            echo "ECR_REPOSITORY=spring-demo-prod" >> $GITHUB_ENV
            echo "APP_ENV=prod" >> $GITHUB_ENV
            echo "SERVER_PORT=9091" >> $GITHUB_ENV
            echo "CONTAINER_NAME=spring-demo-prod" >> $GITHUB_ENV
          elif [[ "${{ github.ref_name }}" == "uat" ]]; then
            echo "ROLE_ARN=${{ secrets.UAT_ROLE_ARN }}" >> $GITHUB_ENV
            echo "ECR_REPOSITORY=spring-demo-uat" >> $GITHUB_ENV
            echo "APP_ENV=uat" >> $GITHUB_ENV
            echo "SERVER_PORT=9092" >> $GITHUB_ENV
            echo "CONTAINER_NAME=spring-demo-uat" >> $GITHUB_ENV
          elif [[ "${{ github.ref_name }}" == "dev" ]]; then
            echo "ROLE_ARN=${{ secrets.DEV_ROLE_ARN }}" >> $GITHUB_ENV
            echo "ECR_REPOSITORY=spring-demo-dev" >> $GITHUB_ENV
            echo "APP_ENV=dev" >> $GITHUB_ENV
            echo "SERVER_PORT=9093" >> $GITHUB_ENV
            echo "CONTAINER_NAME=spring-demo-dev" >> $GITHUB_ENV
          fi

      - name: Detect changed files
        id: changes
        uses: tj-actions/changed-files@v44
        with:
          files: |
            src/**
            Dockerfile
            pom.xml

      - name: Configure AWS credentials using IAM Role
        if: steps.changes.outputs.any_changed == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: eu-north-1

      - name: Login to ECR
        if: steps.changes.outputs.any_changed == 'true'
        run: |
          aws ecr get-login-password --region eu-north-1 | docker login --username AWS --password-stdin $ECR_REGISTRY

      - name: Build Docker image
        if: steps.changes.outputs.any_changed == 'true'
        run: docker build -t $ECR_REPOSITORY .

      - name: Tag image
        if: steps.changes.outputs.any_changed == 'true'
        run: |
          docker tag $ECR_REPOSITORY:latest $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker tag $ECR_REPOSITORY:latest $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Push images to ECR
        if: steps.changes.outputs.any_changed == 'true'
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Deploy to EC2
        if: steps.changes.outputs.any_changed == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            if ! command -v docker &> /dev/null
            then
              sudo apt update
              sudo apt install docker.io -y
              sudo systemctl start docker
              sudo systemctl enable docker
            fi

            if ! command -v aws &> /dev/null
            then
              sudo apt update
              sudo apt install unzip curl -y
              curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
              unzip -o awscliv2.zip
              sudo ./aws/install
            fi

            aws ecr get-login-password --region eu-north-1 | sudo docker login --username AWS --password-stdin 350646758224.dkr.ecr.eu-north-1.amazonaws.com

            sudo docker pull 350646758224.dkr.ecr.eu-north-1.amazonaws.com/$ECR_REPOSITORY:latest
            sudo docker stop $CONTAINER_NAME || true
            sudo docker rm $CONTAINER_NAME || true
            sudo docker run -d --name $CONTAINER_NAME \
              -p $SERVER_PORT:$SERVER_PORT \
              -e SERVER_PORT=$SERVER_PORT \
              -e APP_ENV=$APP_ENV \
              --restart unless-stopped \
              350646758224.dkr.ecr.eu-north-1.amazonaws.com/$ECR_REPOSITORY:latest

            sudo docker image prune -f
