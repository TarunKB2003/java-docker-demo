name: Deploy Java App to AWS

on:
  pull_request:
    branches:
      - dev
      - uat
      - main
    paths:
      - 'src/**'
      - 'Dockerfile'
      - 'pom.xml'
      - '.github/workflows/**'

  push:
    branches:
      - dev
      - uat
      - main
    paths:
      - 'src/**'
      - 'Dockerfile'
      - 'pom.xml'
      - '.github/workflows/**'

  workflow_dispatch:

env:
  ECR_REGISTRY: 350646758224.dkr.ecr.eu-north-1.amazonaws.com
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'dev' && 'dev' || github.ref_name == 'uat' && 'uat' || github.ref_name == 'main' && 'prod' }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}

      - name: Build application
        run: mvn clean package -Dmaven.test.skip=true

      - name: Detect changed files
        id: changes
        uses: tj-actions/changed-files@v44
        with:
          files: |
            src/**
            Dockerfile
            pom.xml

      - name: Build Docker image
        if: steps.changes.outputs.any_changed == 'true'
        run: docker build -t ${{ vars.ECR_REPOSITORY }} .

  deploy:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'dev' && 'dev' || github.ref_name == 'uat' && 'uat' || github.ref_name == 'main' && 'prod' }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Detect changed files
        id: changes
        uses: tj-actions/changed-files@v44
        with:
          files: |
            src/**
            Dockerfile
            pom.xml

      - name: Configure AWS credentials
        if: steps.changes.outputs.any_changed == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: eu-north-1

      - name: Login to ECR
        if: steps.changes.outputs.any_changed == 'true'
        run: |
          aws ecr get-login-password --region eu-north-1 | docker login --username AWS --password-stdin $ECR_REGISTRY

      - name: Build Docker image
        if: steps.changes.outputs.any_changed == 'true'
        run: docker build -t ${{ vars.ECR_REPOSITORY }} .

      - name: Tag image
        if: steps.changes.outputs.any_changed == 'true'
        run: |
          docker tag ${{ vars.ECR_REPOSITORY }}:latest $ECR_REGISTRY/${{ vars.ECR_REPOSITORY }}:latest
          docker tag ${{ vars.ECR_REPOSITORY }}:latest $ECR_REGISTRY/${{ vars.ECR_REPOSITORY }}:$IMAGE_TAG

      - name: Push images to ECR
        if: steps.changes.outputs.any_changed == 'true'
        run: |
          docker push $ECR_REGISTRY/${{ vars.ECR_REPOSITORY }}:latest
          docker push $ECR_REGISTRY/${{ vars.ECR_REPOSITORY }}:$IMAGE_TAG

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            if ! command -v docker &> /dev/null
            then
              sudo apt update
              sudo apt install docker.io -y
              sudo systemctl start docker
              sudo systemctl enable docker
            fi

            if ! command -v aws &> /dev/null
            then
              sudo apt update
              sudo apt install unzip curl -y
              curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
              unzip -o awscliv2.zip
              sudo ./aws/install
            fi

            aws ecr get-login-password --region eu-north-1 | sudo docker login --username AWS --password-stdin 350646758224.dkr.ecr.eu-north-1.amazonaws.com

            sudo docker pull 350646758224.dkr.ecr.eu-north-1.amazonaws.com/${{ vars.ECR_REPOSITORY }}:latest
            sudo docker stop spring-demo || true
            sudo docker rm spring-demo || true
            sudo docker run -d --name spring-demo -p ${{ vars.SERVER_PORT }}:${{ vars.SERVER_PORT }} 350646758224.dkr.ecr.eu-north-1.amazonaws.com/${{ vars.ECR_REPOSITORY }}:latest

            sudo docker image prune -f